<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blood Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Great+Vibes&family=Roboto&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Roboto', sans-serif;
    }

    .hero {
      height: 100vh;
      background-image: url('1234.jpg');
      background-size: cover;
      background-position: center;
      position: relative;
      color: white;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.5);
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .navbar {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 40px;
      background-color: rgba(255, 102, 102, 1);
      <!--background-color: rgba(255, 0, 0, 0.95);-->
      <!--background-color: rgba(255, 0, 0, 0.35);-->
      z-index: 2;
    }

    .left a,
    .right a {
      margin: 0 15px;
      text-decoration: none;
      color: white;
      font-weight: 500;
      font-size: 16px;
    }

    .left a:hover,
    .right a:hover {
      color: #ffcccc;
    }

    .header-title {
      text-align: center;
      flex: 1;
    }

    .header-title h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: bold;
      margin: 0;
    }

    .header-title p {
      font-family: 'Great Vibes', cursive;
      font-size: 20px;
      margin: 0;
      letter-spacing: 1px;
    }

    .title-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      width: 100%;
    }

    .features {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .feature-box {
      background-color: rgba(255, 255, 255, 0.2);
      padding: 15px;
      border-radius: 15px;
      backdrop-filter: blur(6px);
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
      width: 150px;
    }

    .feature-box:hover {
      background-color: rgba(255, 255, 255, 0.5);
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.5);
    }

    .feature-box img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
      border: 3px solid white;
    }

    .feature-box span {
      display: block;
      font-weight: bold;
      font-size: 16px;
      color: #fff;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
    }

    .feature-box a {
      text-decoration: none;
      color: inherit;
    }

  </style>
</head>
<body>

  <div class="hero">
    <div class="overlay"></div>

    <div class="navbar">
      <div class="left">
        <a href="mainPage.html">Home</a>
        <a href="profile.html">Profile</a>
      </div>

      <div class="header-title">
        <h1>BLOOD CONNECT</h1>
        <p>Save Your Soul</p>
      </div>

      <div class="right">
        <a href="logout.html">Logout</a>
      </div>
    </div>

    <div class="title-center">
      <div class="features">
        <div class="feature-box">
          <a href="requestBlood.html">
            <img src="reqB.jpg" alt="Request Blood">
            <span>Request Blood</span>
          </a>
        </div>
       	<div class="feature-box">
          <a href="availableDonors.html">
            <img src="availD.jpg" alt="Available Donors">
            <span>Available Donors</span>
          </a>
        </div>
	<div class="feature-box">
          <a href="liveTracking.html">
            <img src="liveTracking.jpg" alt="Live Tracking">
            <span>Live Tracking</span>
          </a>
        </div>
	<div class="feature-box">
          <a href="pickUpDropIn.html">
            <img src="pickUp.jpg" alt="Need Transportation?">
            <span>Need Transpotation?</span>
          </a>
        </div>
	<div class="feature-box">
          <a href="KnowMoreAboutBloodGroups.html">
            <img src="knowMore.jpg" alt="Know MOre About Blood Groups">
            <span>Know More About Blood Groups</span>
          </a>
        </div>
	<div class="feature-box">
          <a href="donateBloodButWhy.html">
            <img src="whyD.jpg" alt="Why To Donate?">
            <span>Why to Donate?</span>
          </a>
        </div>
	<div class="feature-box">
          <a href="medications.html">
            <img src="medications.jpg" alt="Medications To Be Taken">
            <span>Medications To Be Taken</span>
          </a>
        </div>
        <div class="feature-box">
          <a href="history.html">
            <img src="history.jpg" alt="History">
            <span>History</span>
          </a>
        </div>
	<!--<div class="feature-box">
          <a href="scheduledDonations.html">
            <img src="scheduled.jpg" alt="Scheduled Donations">
            <span>Scheduled Donations</span>
          </a>
        </div>
	<div class="feature-box">
          <a href="futureOppurtunities.html">
            <img src="future.jpg" alt="Future Oppurtunities">
            <span>Future Oppurtunities</span>
          </a>
        </div>-->
        <div class="feature-box">
          <a href="feedback.html">
            <img src="feedback.jpg" alt="Leave your feedback">
            <span>Leave your feedback</span>
          </a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
