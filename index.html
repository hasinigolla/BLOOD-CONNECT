<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOOD CONNECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #d83a3a; 
            text-align: center;
        }
        .title {
            font-family: 'Pacifico', cursive; 
            font-size: 6rem;
            font-weight: bold;
            color: #fff8e3; 
            position: relative;
            text-shadow: 8px 8px 0 #3a7ca5, 
                         16px 16px 0 #f4a261; 
            margin: 0;
        }
        .caption {
            font-family: 'Pacifico', cursive; 
            font-size: 2.5rem;
            color: #fff8e3;
            margin: 40px 0; 
            text-transform: capitalize;
        }
        .nav-container {
            display: flex;
            gap: 20px; 
        }
        .nav-btn {
            text-decoration: none;
            padding: 15px 30px;
            border: 3px solid #fff8e3;
            border-radius: 50px;
            font-size: 1.5rem;
            color: #fff8e3;
            text-transform: uppercase;
            transition: all 0.3s ease; 
        }
        .nav-btn:hover {
            background: #fff8e3;
            color: #d83a3a;
            box-shadow: 0 0 20px rgba(255, 248, 227, 0.8);
        }
    </style>
</head>
<body>
    <h1 class="title">BLOOD CONNECT</h1>
    <p class="caption">Save Your Soul!</p>
    <div class="nav-container">
        <a href="signin.html" class="nav-btn">Sign In</a>
        <a href="signup.html" class="nav-btn">Sign Up</a>
    </div>
</body>
</html>
