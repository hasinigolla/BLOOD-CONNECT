<!DOCTYPE html>
<html>
<head>
  <title>Donor Map - BLOOD CONNECT</title>
  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<h2 style="text-align:center; color: red;">BLOOD CONNECT - Donor Map</h2>
<div id="map"></div>

<script>
  // Replace with your actual donor data from the database
  const donors = [
    {
      name: "Ravi Kumar",
      bloodGroup: "A+",
      lat: 17.6868,
      lng: 83.2185
    },
    {
      name: "Sita Devi",
      bloodGroup: "O-",
      lat: 17.7300,
      lng: 83.2200
    },
    {
      name: "Manoj",
      bloodGroup: "B+",
      lat: 17.7000,
      lng: 83.2500
    }
  ];

  function initMap() {
    const centerLocation = { lat: 17.6868, lng: 83.2185 }; // Vizag center
    const map = new google.maps.Map(document.getElementById("map"), {
      zoom: 12,
      center: centerLocation,
    });

    donors.forEach(donor => {
      const marker = new google.maps.Marker({
        position: { lat: donor.lat, lng: donor.lng },
        map: map,
        label: donor.bloodGroup,
        title: `${donor.name} - ${donor.bloodGroup}`
      });

      const infoWindow = new google.maps.InfoWindow({
        content: `<strong>${donor.name}</strong><br>Blood Group: ${donor.bloodGroup}`
      });

      marker.addListener("click", () => {
        infoWindow.open(map, marker);
      });
    });
  }
</script>

<!-- Google Maps API -->
<script async
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
</script>

</body>
</html>
